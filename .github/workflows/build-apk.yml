name: Build APK from Zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and unzip project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in repo root! Please upload your project zip."
            exit 1
          fi
          echo "Found zip: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted_project

      - name: Locate actual project root (folder containing build.gradle)
        id: locate
        run: |
          PROJECT_DIR=$(find extracted_project -maxdepth 4 -name "build.gradle" -path "*/app/*" -exec dirname {} \; | head -n 1 | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR=$(find extracted_project -maxdepth 4 -name "settings.gradle" -exec dirname {} \; | head -n 1)
          fi
          echo "Project root found at: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: ${{ steps.locate.outputs.project_dir }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkHub-debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
